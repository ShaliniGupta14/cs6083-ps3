<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flight Search</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 60px auto;
        padding: 0 20px;
      }
      h1 {
        color: #2c3e50;
      }
      label {
        display: block;
        margin-top: 14px;
        font-weight: bold;
      }
      input {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }
      button {
        margin-top: 20px;
        padding: 10px 28px;
        background: #2980b9;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 15px;
        cursor: pointer;
      }
      button:hover {
        background: #1f6591;
      }
    </style>
  </head>
  <body>
    <h1>✈ Flight Search</h1>
    <form method="post" action="/flights">
      <label
        >Origin Airport Code
        <input
          type="text"
          name="origin"
          placeholder="e.g. JFK"
          maxlength="3"
          required
        />
      </label>
      <label
        >Destination Airport Code
        <input
          type="text"
          name="dest"
          placeholder="e.g. LAX"
          maxlength="3"
          required
        />
      </label>
      <label
        >From Date
        <input type="date" name="date_from" required />
      </label>
      <label
        >To Date
        <input type="date" name="date_to" required />
      </label>
      <button type="submit">Search Flights</button>
    </form>
  </body>
</html>
