<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flight Search</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 60px auto;
        padding: 0 20px;
      }
      h1 {
        color: #2c3e50;
      }
      label {
        display: block;
        margin-top: 14px;
        font-weight: bold;
      }
      input[type="text"] {
        width: 100%;
        padding: 8px;
        margin-top: 4px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }
      .date-range {
        display: flex;
        gap: 10px;
        margin-top: 4px;
      }
      .date-range input {
        flex: 1;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }
      .date-range span {
        display: flex;
        align-items: center;
        color: #555;
        font-weight: normal;
      }
      button {
        margin-top: 20px;
        padding: 10px 28px;
        background: #2980b9;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 15px;
        cursor: pointer;
      }
      button:hover {
        background: #1f6591;
      }
      #range-display {
        margin-top: 6px;
        font-size: 13px;
        color: #2980b9;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <h1>✈ Flight Search</h1>
    <form method="post" action="/flights" onsubmit="return validateDates()">
      <label
        >Origin Airport Code
        <input
          type="text"
          name="origin"
          placeholder="e.g. JFK"
          maxlength="3"
          required
        />
      </label>
      <label
        >Destination Airport Code
        <input
          type="text"
          name="dest"
          placeholder="e.g. LAX"
          maxlength="3"
          required
        />
      </label>
      <label
        >Date Range
        <div class="date-range">
          <input
            type="date"
            name="date_from"
            id="date_from"
            required
            onchange="updateRange()"
          />
          <span>→</span>
          <input
            type="date"
            name="date_to"
            id="date_to"
            required
            onchange="updateRange()"
          />
        </div>
        <div id="range-display"></div>
      </label>
      <button type="submit">Search Flights</button>
    </form>
    <script>
      function updateRange() {
        const from = document.getElementById("date_from").value;
        const to = document.getElementById("date_to").value;
        const el = document.getElementById("range-display");
        if (from && to) {
          if (to < from) {
            el.style.color = "#e74c3c";
            el.textContent = "⚠ End date must be after start date.";
          } else {
            const days =
              Math.round((new Date(to) - new Date(from)) / 86400000) + 1;
            el.style.color = "#2980b9";
            el.textContent = `📅 ${days} day${days > 1 ? "s" : ""} selected`;
          }
        }
      }
      function validateDates() {
        const from = document.getElementById("date_from").value;
        const to = document.getElementById("date_to").value;
        if (to < from) {
          alert("End date must be on or after the start date.");
          return false;
        }
        return true;
      }
    </script>
  </body>
</html>
